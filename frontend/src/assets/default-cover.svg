<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="NavQuest itinerary">
  <defs>
    <linearGradient id="goldenHour" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e67e34"/>
      <stop offset="100%" stop-color="#4e6540"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#goldenHour)"/>
  <!-- NavQuest diamond mark: rounded square rotated 45deg, centered, low opacity -->
  <rect x="168" y="93" width="64" height="64" rx="16"
        fill="#ffffff" opacity="0.18"
        transform="rotate(45 200 125)"/>
</svg>
